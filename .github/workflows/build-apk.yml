name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Grant write permissions for creating releases
permissions:
  contents: write

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Build Release APK (signed with debug key for sideloading)
        run: gradle assembleRelease --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Rename APKs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk 424DNA-TamperEnable-debug.apk
          cp app/build/outputs/apk/release/app-release.apk 424DNA-TamperEnable-release.apk

      - name: Upload Debug APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: 424DNA-TamperEnable-debug
          path: 424DNA-TamperEnable-debug.apk
          retention-days: 90

      - name: Upload Release APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: 424DNA-TamperEnable-release
          path: 424DNA-TamperEnable-release.apk
          retention-days: 90

      - name: Create GitHub Release with APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "424DNA TamperEnable v1.0.${{ github.run_number }}"
          body: |
            ## 424DNA TT Tamper-Enable APK

            Aktiviert **ausschließlich** die Tamper-Erkennung auf NXP NTAG 424 DNA TT Chips.

            ### Was diese App macht:
            - ✅ Tamper-Erkennung aktivieren (`SetConfiguration Option 07h`)
            - ❌ Keine Schlüssel werden geändert
            - ❌ Keine anderen Einstellungen werden geändert
            - ❌ Kein NDEF-Inhalt wird geändert

            ### Voraussetzungen:
            - Android 8.0+ (API 26)
            - NFC-fähiges Gerät
            - Chip muss noch den **Standard-Werksschlüssel** haben (16× `0x00`)

            ### Installation:
            1. `424DNA-TamperEnable-debug.apk` herunterladen
            2. In Android-Einstellungen → "Apps aus unbekannten Quellen" erlauben
            3. APK installieren und ausführen
            4. NTAG 424 DNA TT Chip ans Handy halten

            > ⚠️ Die Tamper-Erkennung kann nach dem Aktivieren **nicht rückgängig gemacht** werden!
          files: |
            424DNA-TamperEnable-debug.apk
            424DNA-TamperEnable-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
