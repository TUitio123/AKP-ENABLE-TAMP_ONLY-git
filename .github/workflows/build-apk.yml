name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK
        run: gradle assembleDebug
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk 424DNA-TamperEnable.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: 424DNA-TamperEnable
          path: 424DNA-TamperEnable.apk
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "424DNA TamperEnable v1.0.${{ github.run_number }}"
          body: |
            ## 424DNA TT — Tamper-Erkennung aktivieren

            Aktiviert **ausschließlich** die Tamper-Erkennung auf NXP NTAG 424 DNA TT Chips.

            ### Was die App macht:
            - ✅ Tamper-Erkennung einschalten (`SetConfiguration Option 07h`)
            - ❌ Keine Schlüssel werden geändert
            - ❌ Kein NDEF-Inhalt wird geändert
            - ❌ Sonst nichts

            ### Voraussetzungen:
            - Android 8.0+ (API 26)
            - NFC-fähiges Gerät
            - Chip muss noch den **Werksschlüssel** haben (16× `0x00`)

            ### Installation:
            1. `424DNA-TamperEnable.apk` herunterladen
            2. Android: Einstellungen → Apps → Unbekannte Quellen erlauben
            3. APK tippen → Installieren
            4. App öffnen → Chip ans Handy halten

            > ⚠️ Tamper-Erkennung kann **nicht rückgängig** gemacht werden!
          files: 424DNA-TamperEnable.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
